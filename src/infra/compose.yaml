name: gustavogonz-com-br
services:
  database:
    container_name: postgres-dev
    image: 'postgres:16.4-alpine3.20'
    ports:
      - '5432:5432'
    env_file:
      - ../../.env.development
  mailcatcher:
    container_name: mailcatcher-dev
    image: 'sj26/mailcatcher'
    ports:
      - '1025:1025'
      - '1080:1080'
